name: tp0
services:
  server:
    container_name: server
    image: server:latest
    entrypoint: python3 /main.py
    environment:
    - PYTHONUNBUFFERED=1
    - AGENCIES_AMOUNT=2
    networks:
    - testing_net
    volumes:
    - ./server/config.ini:/config.ini
  client1:
    container_name: client1
    image: client:latest
    entrypoint: /client
    environment:
    - CLI_ID=1
    - NOMBRE=Nombre1
    - APELLIDO=Apellido1
    - DOCUMENTO=10000001
    - NACIMIENTO=1990-01-01
    - NUMERO=7571
    networks:
    - testing_net
    volumes:
    - ./client/config.yaml:/config.yaml
    - ./.data/agency-1.csv:/data/agency.csv
    depends_on:
    - server
  client2:
    container_name: client2
    image: client:latest
    entrypoint: /client
    environment:
    - CLI_ID=2
    - NOMBRE=Nombre2
    - APELLIDO=Apellido2
    - DOCUMENTO=10000002
    - NACIMIENTO=1990-01-02
    - NUMERO=7572
    networks:
    - testing_net
    volumes:
    - ./client/config.yaml:/config.yaml
    - ./.data/agency-2.csv:/data/agency.csv
    depends_on:
    - server
networks:
  testing_net:
    ipam:
      driver: default
      config:
      - subnet: 172.25.125.0/24
